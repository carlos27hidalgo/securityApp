<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security App</title>
    <style>
        /* Mobile Styles */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        nav {
            display: flex;
            flex-direction: column;
            background-color: #333;
        }

        nav a {
            padding: 14px;
            text-decoration: none;
            color: white;
            text-align: center;
        }

        nav a:hover {
            background-color: #575757;
        }

        /* Media Queries for Small Tablets and Mobile Devices */
        @media (max-width: 768px) {
            nav {
                flex-direction: row;
                flex-wrap: nowrap;
            }
        }

        @media (max-width: 480px) {
            nav a {
                flex: 1;
                text-align: center;
            }
        }
    </style>
</head>
<body>
<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>
<div>
    <h1>Welcome to the Security App</h1>
    <p>This app helps you manage your security needs effectively.</p>
</div>
</body>
</html>
