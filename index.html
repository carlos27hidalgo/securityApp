<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL Facial Recognition</title>
    <style>
        /* Basic reset */
        body, h1, h2, h3, p, ul, li {
            margin: 0;
            padding: 0;
            list-style: none;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            color: #333;
        }

        /* Layout styles */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Styles for different devices */
        @media (max-width: 768px) {
            body {
                font-size: 14px;
            }
        }

        @media (min-width: 769px) {
            body {
                font-size: 16px;
            }
        }

        /* Camera detection alert */
        .alert {
            padding: 10px;
            background-color: #f44336;
            color: white;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SENTINEL Facial Recognition System</h1>
        <div class="alert" id="alert">Camera is off or not detected!</div>
        <button id="start-camera">Start Camera</button>
        <video id="video" width="720" height="560" autoplay></video>
    </div>
    <script>
        const video = document.getElementById('video');
        const alertBox = document.getElementById('alert');

        document.getElementById('start-camera').addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                alertBox.style.display = 'none';
            } catch (error) {
                alertBox.style.display = 'block';
            }
        });

        // Database management functionality would go here
    </script>
</body>
</html>
